name: Flint Tests

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone SteelMC
        uses: actions/checkout@v6
        with:
          repository: Steel-Foundation/SteelMC
          path: SteelMC

      - name: Checkout flint-steel
        uses: actions/checkout@v6
        with:
          path: flint-steel

      - name: Clone FlintBenchmark
        uses: actions/checkout@v6
        with:
          repository: FlintTestMC/FlintBenchmark
          path: flint/FlintBenchmark

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            steel/SteelMC -> target

      - name: Configure SteelMC patch
        working-directory: flint-steel
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [patch."https://github.com/Steel-Foundation/SteelMC.git"]
          steel-core     = { path = "../SteelMC/steel-core" }
          steel-protocol = { path = "../SteelMC/steel-protocol" }
          steel-registry = { path = "../SteelMC/steel-registry" }
          steel-utils    = { path = "../SteelMC/steel-utils" }
          EOF

      - name: Run flint-steel tests
        timeout-minutes: 15
        working-directory: flint-steel
        env:
          TEST_PATH: ${{ github.workspace }}/flint/FlintBenchmark
        run: cargo test --profile cicd --lib -p flint-steel test_run_all_flint_benchmarks -- --nocapture

      - name: Upload Flint summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flint-summary
          path: steel/SteelMC/flint-steel/log/flint_summary.json
